<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OUR SECRET SPACE</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sky">
  <span class="cloud c1">✦</span>
  <span class="cloud c2">✦</span>
  <span class="cloud c3">✦</span>
  <span class="tulip t1">🌷</span>
  <span class="tulip t2">🌷</span>
  <span class="tulip t3">🌷</span>
  <span class="tulip t4">🌷</span>
</div>

<header class="hero">
  <p class="eyebrow">a little corner of the internet, just for us</p>
  <h1>OUR SECRET SPACE</h1>
  <p class="subtitle">every screenshot, clip, and memory — kept in one place</p>
</header>

<main>
  <section class="upload-card" id="uploadCard">
    <h2>Add something new</h2>
    <form id="uploadForm">
      <div class="field-row">
        <div class="field">
          <label for="uploader">Your name</label>
          <input type="text" id="uploader" name="uploader" placeholder="e.g. Priya" required>
        </div>
        <div class="field">
          <label for="caption">Caption <span class="optional">(optional)</span></label>
          <input type="text" id="caption" name="caption" placeholder="add a little note...">
        </div>
      </div>

      <label class="dropzone" id="dropzone" for="fileInput">
        <input type="file" id="fileInput" name="media" accept="image/*,video/*" required hidden>
        <span class="dz-icon">＋</span>
        <span class="dz-text" id="dzText">Tap to choose a photo or video</span>
      </label>

      <button type="submit" id="submitBtn">Pin it to the wall</button>
      <p class="status" id="status"></p>
    </form>
  </section>

  <section class="wall">
    <div class="wall-header">
      <h2>The wall so far</h2>
      <span class="count" id="itemCount"></span>
    </div>
    <div class="grid" id="grid"></div>
    <p class="empty-msg" id="emptyMsg">Nothing here yet — be the first to pin a memory! 💜</p>
  </section>
</main>

<footer>
  <p>made with soft pixels, for the two of us</p>
</footer>

<script src="script.js"></script>
</body>
</html>
