<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Our Secret Space</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- floating background decorations -->
  <div class="floaties" id="floaties" aria-hidden="true"></div>

  <header class="hero">
    <div class="hero-badge">✿ just us ✿</div>
    <h1 class="hero-title">OUR SECRET SPACE</h1>
    <p class="hero-sub">a little corner for our favorite moments</p>
  </header>

  <main>
    <div class="toolbar">
      <div class="toolbar-left">
        <button class="chip" id="add-photo-btn">＋ Add a photo</button>
      </div>
      <div class="toolbar-right">
        <span class="count-pill" id="photo-count">0 memories</span>
      </div>
    </div>

    <section class="gallery" id="gallery">
      <!-- photo cards injected by script.js -->
    </section>

    <p class="empty-state" id="empty-state" hidden>
      No photos yet — tap "Add a photo" to start your secret space 🤍
    </p>
  </main>

  <footer class="site-footer">
    made with <span class="heart-inline">♡</span> for the memories that matter
  </footer>

  <!-- copy-url modal (shown right after a successful upload) -->
  <div class="copy-modal" id="copy-modal">
    <div class="copy-modal-box">
      <p class="copy-modal-title">✿ Photo added! ✿</p>
      <p class="copy-modal-sub">Copy this and paste it into <code>GALLERY_IMAGES</code> in <code>config.js</code> to keep it forever:</p>
      <textarea id="copy-modal-text" readonly></textarea>
      <div class="copy-modal-actions">
        <button class="chip" id="copy-modal-copy">Copy</button>
        <button class="chip chip-outline" id="copy-modal-close">Done</button>
      </div>
      <p class="copy-modal-note" id="copy-modal-note" hidden>Copied! 🤍</p>
    </div>
  </div>

  <!-- lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close">✕</button>
    <img id="lightbox-img" src="" alt="" />
    <p class="lightbox-caption" id="lightbox-caption"></p>
  </div>

  <!-- Cloudinary Upload Widget -->
  <script src="https://upload-widget.cloudinary.com/latest/global/all.js" type="text/javascript"></script>
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
